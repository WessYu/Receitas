services:
  postgres:
    image: postgres:16-alpine
    container_name: receitas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receitas
    ports:
      - "5432:5432"
    volumes:
      - receitas_postgres_data:/var/lib/postgresql/data

volumes:
  receitas_postgres_data:
