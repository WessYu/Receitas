<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Receitas</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <meta
      name="description"
      content="Site moderno de receitas com busca, filtros, favoritos e painel administrativo demonstrativo."
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #20221e;
        --muted: #686b61;
        --line: rgba(32, 34, 30, 0.12);
        --olive: #53634d;
        --sage: #87956b;
        --linen: #f6f0e6;
        --paper: #fffaf2;
        --white: #ffffff;
        --tomato: #c85f4d;
        --shadow: 0 24px 70px rgba(32, 34, 30, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 0%, rgba(200, 95, 77, 0.14), transparent 32rem),
          linear-gradient(180deg, var(--paper), var(--linen) 48%, var(--paper));
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 250, 242, 0.88);
        backdrop-filter: blur(16px);
      }

      .topbar-inner {
        display: flex;
        min-height: 76px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        border: 0;
        background: transparent;
        color: var(--ink);
        font-weight: 900;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(32, 34, 30, 0.12);
      }

      .brand-name {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.65rem;
        font-weight: 700;
      }

      .nav {
        display: none;
        align-items: center;
        gap: 8px;
      }

      .nav button {
        border: 0;
        border-radius: 8px;
        background: transparent;
        padding: 10px 12px;
        color: rgba(32, 34, 30, 0.68);
        font-size: 0.92rem;
        font-weight: 800;
        transition:
          background 180ms ease,
          color 180ms ease;
      }

      .nav button:hover,
      .nav button.active {
        background: rgba(83, 99, 77, 0.1);
        color: var(--ink);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 16px;
        font-size: 0.92rem;
        font-weight: 900;
        text-decoration: none;
        transition:
          transform 180ms ease,
          background 180ms ease,
          border-color 180ms ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-primary {
        background: var(--ink);
        color: var(--paper);
      }

      .btn-secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.62);
        color: var(--ink);
      }

      .btn-danger {
        background: var(--tomato);
        color: var(--white);
      }

      .mobile-nav {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 0 0 12px;
      }

      .mobile-nav button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.56);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .mobile-nav button.active {
        background: var(--ink);
        color: var(--paper);
      }

      main {
        padding: 34px 0 64px;
      }

      .hero {
        display: grid;
        min-height: calc(100vh - 140px);
        align-items: center;
        gap: 34px;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--olive);
        font-size: 0.75rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        letter-spacing: 0;
      }

      h1 {
        max-width: 820px;
        font-size: clamp(3.2rem, 8vw, 6.6rem);
        line-height: 0.94;
      }

      h2 {
        font-size: clamp(2.2rem, 4vw, 4rem);
        line-height: 1;
      }

      h3 {
        font-size: 1.65rem;
        line-height: 1.08;
      }

      .lead {
        max-width: 680px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.8;
      }

      .search-row {
        display: grid;
        max-width: 720px;
        gap: 10px;
        margin-top: 30px;
      }

      .field,
      .select,
      .area {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        outline: 0;
        padding: 0 14px;
        box-shadow: 0 1px 0 rgba(32, 34, 30, 0.04);
      }

      .area {
        min-height: 96px;
        padding-top: 12px;
        resize: vertical;
      }

      .field:focus,
      .select:focus,
      .area:focus {
        border-color: rgba(83, 99, 77, 0.58);
        box-shadow: 0 0 0 4px rgba(83, 99, 77, 0.12);
      }

      .hero-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--ink);
        color: var(--paper);
        box-shadow: var(--shadow);
      }

      .hero-image {
        min-height: 360px;
        background-position: center;
        background-size: cover;
      }

      .hero-card-content {
        padding: 24px;
      }

      .hero-card-content p {
        color: rgba(255, 250, 242, 0.72);
        line-height: 1.7;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 24px;
      }

      .stat {
        border: 1px solid rgba(255, 250, 242, 0.16);
        border-radius: 8px;
        padding: 14px;
      }

      .stat strong {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.7rem;
      }

      .stat span {
        color: rgba(255, 250, 242, 0.62);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .section {
        padding: 40px 0;
      }

      .section-head {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 22px;
      }

      .cards {
        display: grid;
        gap: 18px;
      }

      .recipe-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 12px 34px rgba(32, 34, 30, 0.06);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
      }

      .recipe-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow);
      }

      .card-image {
        position: relative;
        min-height: 230px;
        background-position: center;
        background-size: cover;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        background: rgba(255, 250, 242, 0.92);
        padding: 0 10px;
        color: var(--ink);
        font-size: 0.76rem;
        font-weight: 900;
      }

      .card-image .pill {
        position: absolute;
        left: 14px;
        top: 14px;
      }

      .card-body {
        padding: 18px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        margin-bottom: 12px;
        color: rgba(32, 34, 30, 0.58);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .card-body p {
        color: var(--muted);
        line-height: 1.65;
      }

      .card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .filters {
        display: grid;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
        padding: 16px;
        box-shadow: 0 12px 34px rgba(32, 34, 30, 0.05);
      }

      .filters-grid {
        display: grid;
        gap: 10px;
      }

      .detail {
        display: grid;
        gap: 24px;
      }

      .detail-image {
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background-position: center;
        background-size: cover;
        box-shadow: var(--shadow);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.68);
        padding: 22px;
        box-shadow: 0 12px 34px rgba(32, 34, 30, 0.05);
      }

      .list {
        display: grid;
        gap: 10px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .list li {
        border-radius: 8px;
        background: rgba(255, 250, 242, 0.9);
        padding: 12px 14px;
        line-height: 1.6;
      }

      .steps {
        display: grid;
        gap: 16px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .steps li {
        display: grid;
        grid-template-columns: 40px 1fr;
        gap: 14px;
        line-height: 1.7;
      }

      .step-number {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border-radius: 999px;
        background: var(--olive);
        color: var(--white);
        font-weight: 900;
      }

      .empty {
        border: 1px dashed rgba(32, 34, 30, 0.22);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.5);
        padding: 48px 22px;
        text-align: center;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.7);
      }

      table {
        width: 100%;
        min-width: 720px;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.92rem;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 14px 16px;
      }

      th {
        color: rgba(32, 34, 30, 0.48);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .admin-grid {
        display: grid;
        gap: 16px;
      }

      .admin-form {
        display: grid;
        gap: 12px;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 50;
        max-width: min(360px, calc(100vw - 36px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        padding: 14px 16px;
        box-shadow: var(--shadow);
        font-weight: 800;
        opacity: 0;
        transform: translateY(14px);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      footer {
        border-top: 1px solid var(--line);
        padding: 26px 0;
        color: var(--muted);
      }

      @media (min-width: 720px) {
        .nav {
          display: flex;
        }

        .mobile-nav {
          display: none;
        }

        .search-row {
          grid-template-columns: 1fr auto;
        }

        .section-head {
          flex-direction: row;
          align-items: end;
          justify-content: space-between;
        }

        .cards {
          grid-template-columns: repeat(2, 1fr);
        }

        .filters-grid {
          grid-template-columns: 1.25fr repeat(4, 1fr) auto;
        }

        .admin-grid {
          grid-template-columns: 0.9fr 1.1fr;
        }
      }

      @media (min-width: 980px) {
        .hero,
        .detail {
          grid-template-columns: 1fr 0.92fr;
        }

        .cards {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="page topbar-inner">
        <button class="brand" type="button" data-view="home" aria-label="Ir para inicio">
          <img class="brand-mark" src="./logo.svg" alt="" width="42" height="42" />
          <span class="brand-name">Receitas</span>
        </button>
        <nav class="nav" aria-label="Navegacao principal">
          <button type="button" data-view="home">Inicio</button>
          <button type="button" data-view="recipes">Receitas</button>
          <button type="button" data-view="saved">Salvas</button>
          <button type="button" data-view="admin">Admin</button>
        </nav>
        <div class="actions">
          <a class="btn btn-secondary" href="https://github.com/WessYu/Receitas">GitHub</a>
        </div>
      </div>
      <div class="page mobile-nav" aria-label="Navegacao mobile">
        <button type="button" data-view="home">Inicio</button>
        <button type="button" data-view="recipes">Receitas</button>
        <button type="button" data-view="saved">Salvas</button>
        <button type="button" data-view="admin">Admin</button>
      </div>
    </header>

    <main class="page" id="app"></main>
    <footer>
      <div class="page">Receitas modernas para cozinhar melhor no dia a dia.</div>
    </footer>
    <div class="toast" id="toast" role="status"></div>

    <script>
      const baseRecipes = [
        {
          id: "risoto-limao",
          title: "Risoto de limao siciliano com ervas",
          category: "Jantar rapido",
          time: 35,
          servings: 2,
          difficulty: "Media",
          featured: true,
          image:
            "https://images.unsplash.com/photo-1476124369491-e7addf5db371?auto=format&fit=crop&w=1200&q=80",
          description:
            "Cremoso, perfumado e equilibrado, este risoto resolve um jantar especial com poucos ingredientes e tecnica simples.",
          ingredients: [
            "1 xicara de arroz arboreo",
            "1/2 cebola picada",
            "1 litro de caldo de legumes quente",
            "1 limao siciliano",
            "3 colheres de parmesao ralado",
            "1 colher de manteiga fria"
          ],
          steps: [
            "Refogue a cebola em azeite ate ficar translucida.",
            "Junte o arroz e mexa por dois minutos.",
            "Adicione o caldo quente aos poucos, mexendo ate ficar cremoso.",
            "Finalize com limao, parmesao e manteiga fria."
          ]
        },
        {
          id: "bowl-graos",
          title: "Bowl de graos com legumes tostados",
          category: "Vegetariano",
          time: 30,
          servings: 2,
          difficulty: "Facil",
          featured: true,
          image:
            "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=1200&q=80",
          description:
            "Uma refeicao completa, colorida e nutritiva com camadas de textura, molho fresco e preparo simples.",
          ingredients: [
            "1 xicara de quinoa cozida",
            "1 abobrinha em cubos",
            "1 cenoura em tiras",
            "1/2 xicara de grao-de-bico",
            "2 colheres de tahine",
            "1 limao"
          ],
          steps: [
            "Asse a abobrinha, a cenoura e o grao-de-bico com azeite e sal.",
            "Misture tahine, limao, agua e sal ate formar um molho fluido.",
            "Monte o bowl com quinoa, legumes tostados e molho por cima."
          ]
        },
        {
          id: "panquecas-banana",
          title: "Panquecas de banana e aveia",
          category: "Cafe da manha",
          time: 20,
          servings: 2,
          difficulty: "Facil",
          featured: true,
          image:
            "https://images.unsplash.com/photo-1528207776546-365bb710ee93?auto=format&fit=crop&w=1200&q=80",
          description:
            "Maciez natural, docura na medida e preparo rapido para um cafe da manha sem complicacao.",
          ingredients: [
            "2 bananas maduras",
            "2 ovos",
            "1/2 xicara de aveia em flocos",
            "1 pitada de canela",
            "1 colher de fermento quimico"
          ],
          steps: [
            "Amasse as bananas e misture com ovos, aveia, canela e fermento.",
            "Doure pequenas porcoes de massa em frigideira antiaderente.",
            "Sirva com frutas, iogurte ou mel."
          ]
        },
        {
          id: "torta-chocolate",
          title: "Torta fria de chocolate amargo",
          category: "Sobremesas",
          time: 55,
          servings: 8,
          difficulty: "Avancada",
          featured: false,
          image:
            "https://images.unsplash.com/photo-1606890737304-57a1ca8a5b62?auto=format&fit=crop&w=1200&q=80",
          description:
            "Sobremesa intensa e elegante, com base crocante e recheio sedoso de chocolate.",
          ingredients: [
            "200 g de biscoito de cacau",
            "80 g de manteiga derretida",
            "300 g de chocolate 70%",
            "300 ml de creme de leite fresco",
            "1 pitada de sal"
          ],
          steps: [
            "Triture os biscoitos, misture com manteiga e pressione na forma.",
            "Aqueca o creme de leite e despeje sobre o chocolate picado.",
            "Mexa ate formar um creme liso e gele ate firmar."
          ]
        },
        {
          id: "massa-tomate",
          title: "Massa curta com tomate assado",
          category: "Massas",
          time: 40,
          servings: 3,
          difficulty: "Facil",
          featured: false,
          image:
            "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?auto=format&fit=crop&w=1200&q=80",
          description:
            "Tomates assados, alho e manjericao criam um molho encorpado para uma massa honesta.",
          ingredients: [
            "300 g de massa curta",
            "500 g de tomate cereja",
            "4 dentes de alho",
            "1 punhado de manjericao",
            "3 colheres de azeite"
          ],
          steps: [
            "Asse os tomates com alho, azeite e sal ate murcharem.",
            "Cozinhe a massa e reserve um pouco da agua.",
            "Misture tudo e finalize com manjericao fresco."
          ]
        },
        {
          id: "salmao-crosta",
          title: "Salmao com crosta de ervas",
          category: "Jantar rapido",
          time: 28,
          servings: 2,
          difficulty: "Media",
          featured: false,
          image:
            "https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=1200&q=80",
          description:
            "Peixe suculento, crosta aromatica e legumes simples para um prato leve e bonito.",
          ingredients: [
            "2 files de salmao",
            "1 xicara de ervas frescas",
            "1/2 xicara de farinha panko",
            "1 limao",
            "2 colheres de azeite"
          ],
          steps: [
            "Misture ervas, panko, azeite, raspas de limao e sal.",
            "Cubra o salmao com a mistura e pressione levemente.",
            "Asse ate o peixe ficar macio e a crosta dourada."
          ]
        }
      ];

      const app = document.querySelector("#app");
      const toast = document.querySelector("#toast");
      const storageKeys = {
        favorites: "receitas-pages-favorites",
        custom: "receitas-pages-custom"
      };

      let state = {
        view: "home",
        query: "",
        category: "",
        difficulty: "",
        maxTime: "",
        ingredient: "",
        selectedId: null,
        favorites: readJson(storageKeys.favorites, []),
        customRecipes: readJson(storageKeys.custom, [])
      };

      function readJson(key, fallback) {
        try {
          return JSON.parse(localStorage.getItem(key)) || fallback;
        } catch {
          return fallback;
        }
      }

      function saveJson(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function getRecipes() {
        return [...baseRecipes, ...state.customRecipes];
      }

      function categories() {
        return [...new Set(getRecipes().map((recipe) => recipe.category))].sort();
      }

      function setView(view) {
        state.view = view;
        state.selectedId = null;
        render();
      }

      function selectRecipe(id) {
        state.selectedId = id;
        state.view = "detail";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function filteredRecipes() {
        return getRecipes().filter((recipe) => {
          const haystack = [
            recipe.title,
            recipe.description,
            recipe.category,
            recipe.ingredients.join(" ")
          ]
            .join(" ")
            .toLowerCase();
          const queryMatch = !state.query || haystack.includes(state.query.toLowerCase());
          const categoryMatch = !state.category || recipe.category === state.category;
          const difficultyMatch = !state.difficulty || recipe.difficulty === state.difficulty;
          const timeMatch = !state.maxTime || recipe.time <= Number(state.maxTime);
          const ingredientMatch =
            !state.ingredient ||
            recipe.ingredients.join(" ").toLowerCase().includes(state.ingredient.toLowerCase());

          return queryMatch && categoryMatch && difficultyMatch && timeMatch && ingredientMatch;
        });
      }

      function isSaved(id) {
        return state.favorites.includes(id);
      }

      function toggleFavorite(id) {
        if (isSaved(id)) {
          state.favorites = state.favorites.filter((item) => item !== id);
          showToast("Receita removida das salvas.");
        } else {
          state.favorites = [...state.favorites, id];
          showToast("Receita salva.");
        }

        saveJson(storageKeys.favorites, state.favorites);
        render();
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2600);
      }

      function recipeCard(recipe) {
        const saved = isSaved(recipe.id);
        return `
          <article class="recipe-card">
            <div class="card-image" style="background-image: url('${recipe.image}')">
              <span class="pill">${recipe.category}</span>
            </div>
            <div class="card-body">
              <div class="meta">
                <span>${recipe.time} min</span>
                <span>${recipe.servings} porcoes</span>
                <span>${recipe.difficulty}</span>
              </div>
              <h3>${recipe.title}</h3>
              <p>${recipe.description}</p>
              <div class="card-actions">
                <button class="btn btn-primary" type="button" data-recipe="${recipe.id}">Ver receita</button>
                <button class="btn btn-secondary" type="button" data-favorite="${recipe.id}">
                  ${saved ? "Remover" : "Salvar"}
                </button>
              </div>
            </div>
          </article>
        `;
      }

      function renderHome() {
        const featured = getRecipes().filter((recipe) => recipe.featured).slice(0, 3);
        const hero = featured[0] || getRecipes()[0];
        return `
          <section class="hero">
            <div>
              <p class="eyebrow">Cozinha simples e elegante</p>
              <h1>Receitas claras para cozinhar melhor.</h1>
              <p class="lead">
                Busque pratos por ingrediente, tempo ou dificuldade, abra o passo a passo e salve
                suas receitas favoritas direto no navegador.
              </p>
              <form class="search-row" id="homeSearch">
                <input class="field" name="query" placeholder="Buscar por receita ou ingrediente" value="${state.query}" />
                <button class="btn btn-primary" type="submit">Buscar receitas</button>
              </form>
            </div>
            <aside class="hero-card">
              <div class="hero-image" style="background-image: url('${hero.image}')"></div>
              <div class="hero-card-content">
                <p class="eyebrow">Receita em destaque</p>
                <h3>${hero.title}</h3>
                <p>${hero.description}</p>
                <div class="stats">
                  <div class="stat"><strong>${getRecipes().length}</strong><span>Receitas</span></div>
                  <div class="stat"><strong>${categories().length}</strong><span>Categorias</span></div>
                  <div class="stat"><strong>${state.favorites.length}</strong><span>Salvas</span></div>
                </div>
              </div>
            </aside>
          </section>
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Destaques</p>
                <h2>Escolhas da semana</h2>
              </div>
              <button class="btn btn-secondary" type="button" data-view="recipes">Ver todas</button>
            </div>
            <div class="cards">${featured.map(recipeCard).join("")}</div>
          </section>
          <section class="section">
            <div class="panel">
              <p class="eyebrow">Categorias</p>
              <h2>Escolha pelo momento</h2>
              <div class="cards" style="margin-top: 22px">
                ${categories()
                  .map(
                    (category) => `
                      <button class="panel" type="button" data-category="${category}" style="text-align:left">
                        <strong>${category}</strong>
                        <p>${getRecipes().filter((recipe) => recipe.category === category).length} receitas cadastradas</p>
                      </button>
                    `
                  )
                  .join("")}
              </div>
            </div>
          </section>
        `;
      }

      function renderFilters() {
        return `
          <form class="filters" id="filters">
            <strong>Filtros</strong>
            <div class="filters-grid">
              <input class="field" name="query" placeholder="Buscar" value="${state.query}" />
              <select class="select" name="category">
                <option value="">Categoria</option>
                ${categories()
                  .map((category) => `<option ${state.category === category ? "selected" : ""}>${category}</option>`)
                  .join("")}
              </select>
              <select class="select" name="difficulty">
                <option value="">Dificuldade</option>
                ${["Facil", "Media", "Avancada"]
                  .map((item) => `<option ${state.difficulty === item ? "selected" : ""}>${item}</option>`)
                  .join("")}
              </select>
              <input class="field" name="maxTime" type="number" min="1" placeholder="Ate min" value="${state.maxTime}" />
              <input class="field" name="ingredient" placeholder="Ingrediente" value="${state.ingredient}" />
              <button class="btn btn-primary" type="submit">Aplicar</button>
            </div>
          </form>
        `;
      }

      function renderRecipes() {
        const recipes = filteredRecipes();
        return `
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Biblioteca</p>
                <h2>Receitas</h2>
              </div>
            </div>
            ${renderFilters()}
            <div class="section">
              ${
                recipes.length
                  ? `<div class="cards">${recipes.map(recipeCard).join("")}</div>`
                  : `<div class="empty"><h3>Nenhuma receita encontrada</h3><p>Ajuste os filtros ou tente um termo mais amplo.</p></div>`
              }
            </div>
          </section>
        `;
      }

      function renderDetail() {
        const recipe = getRecipes().find((item) => item.id === state.selectedId) || getRecipes()[0];
        return `
          <section class="detail">
            <div class="detail-image" style="background-image: url('${recipe.image}')"></div>
            <div>
              <p class="eyebrow">${recipe.category}</p>
              <h1>${recipe.title}</h1>
              <p class="lead">${recipe.description}</p>
              <div class="card-actions" style="margin-top: 24px">
                <span class="pill">${recipe.time} min</span>
                <span class="pill">${recipe.servings} porcoes</span>
                <span class="pill">${recipe.difficulty}</span>
              </div>
              <div class="card-actions" style="margin-top: 24px">
                <button class="btn btn-primary" type="button" data-favorite="${recipe.id}">
                  ${isSaved(recipe.id) ? "Remover das salvas" : "Salvar receita"}
                </button>
                <button class="btn btn-secondary" type="button" data-view="recipes">Voltar</button>
              </div>
              <section class="panel" style="margin-top: 28px">
                <h3>Ingredientes</h3>
                <ul class="list">${recipe.ingredients.map((item) => `<li>${item}</li>`).join("")}</ul>
              </section>
              <section class="panel" style="margin-top: 16px">
                <h3>Modo de preparo</h3>
                <ol class="steps">
                  ${recipe.steps
                    .map((step, index) => `<li><span class="step-number">${index + 1}</span><span>${step}</span></li>`)
                    .join("")}
                </ol>
              </section>
            </div>
          </section>
        `;
      }

      function renderSaved() {
        const saved = getRecipes().filter((recipe) => isSaved(recipe.id));
        return `
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Area privada</p>
                <h2>Receitas salvas</h2>
              </div>
              <button class="btn btn-secondary" type="button" data-view="recipes">Explorar receitas</button>
            </div>
            <div class="panel" style="margin-bottom: 24px">
              <h3>Perfil demo</h3>
              <p>Nome: Usuario Demo</p>
              <p>Email: demo@receitas.local</p>
            </div>
            ${
              saved.length
                ? `<div class="cards">${saved.map(recipeCard).join("")}</div>`
                : `<div class="empty"><h3>Nenhuma receita salva</h3><p>Abra uma receita e salve para montar sua biblioteca.</p></div>`
            }
          </section>
        `;
      }

      function renderAdmin() {
        const recipes = getRecipes();
        return `
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Painel admin demo</p>
                <h2>Controle editorial</h2>
              </div>
              <button class="btn btn-secondary" type="button" id="resetDemo">Resetar demo</button>
            </div>
            <div class="cards" style="margin-bottom: 20px">
              <div class="panel"><p class="eyebrow">Receitas</p><h3>${recipes.length}</h3></div>
              <div class="panel"><p class="eyebrow">Categorias</p><h3>${categories().length}</h3></div>
              <div class="panel"><p class="eyebrow">Usuarios</p><h3>2</h3></div>
            </div>
            <div class="admin-grid">
              <form class="panel admin-form" id="adminForm">
                <h3>Criar receita local</h3>
                <input class="field" name="title" required placeholder="Titulo" />
                <input class="field" name="category" required placeholder="Categoria" />
                <div style="display:grid; gap:10px; grid-template-columns:1fr 1fr">
                  <input class="field" name="time" required type="number" min="1" placeholder="Minutos" />
                  <select class="select" name="difficulty">
                    <option>Facil</option>
                    <option>Media</option>
                    <option>Avancada</option>
                  </select>
                </div>
                <textarea class="area" name="description" required placeholder="Descricao"></textarea>
                <button class="btn btn-primary" type="submit">Criar receita</button>
              </form>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Titulo</th>
                      <th>Categoria</th>
                      <th>Status</th>
                      <th>Tempo</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${recipes
                      .map(
                        (recipe) => `
                          <tr>
                            <td><strong>${recipe.title}</strong></td>
                            <td>${recipe.category}</td>
                            <td><span class="pill">Publicado</span></td>
                            <td>${recipe.time} min</td>
                          </tr>
                        `
                      )
                      .join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </section>
        `;
      }

      function render() {
        document.querySelectorAll("[data-view]").forEach((button) => {
          button.classList.toggle("active", button.dataset.view === state.view);
        });

        if (state.view === "home") app.innerHTML = renderHome();
        if (state.view === "recipes") app.innerHTML = renderRecipes();
        if (state.view === "detail") app.innerHTML = renderDetail();
        if (state.view === "saved") app.innerHTML = renderSaved();
        if (state.view === "admin") app.innerHTML = renderAdmin();
      }

      document.addEventListener("click", (event) => {
        const viewButton = event.target.closest("[data-view]");
        const recipeButton = event.target.closest("[data-recipe]");
        const favoriteButton = event.target.closest("[data-favorite]");
        const categoryButton = event.target.closest("[data-category]");

        if (viewButton) setView(viewButton.dataset.view);
        if (recipeButton) selectRecipe(recipeButton.dataset.recipe);
        if (favoriteButton) toggleFavorite(favoriteButton.dataset.favorite);
        if (categoryButton) {
          state.category = categoryButton.dataset.category;
          state.view = "recipes";
          render();
        }
        if (event.target.id === "resetDemo") {
          state.customRecipes = [];
          state.favorites = [];
          saveJson(storageKeys.custom, []);
          saveJson(storageKeys.favorites, []);
          showToast("Demo reiniciada.");
          render();
        }
      });

      document.addEventListener("submit", (event) => {
        if (event.target.id === "homeSearch") {
          event.preventDefault();
          state.query = new FormData(event.target).get("query").trim();
          state.view = "recipes";
          render();
        }

        if (event.target.id === "filters") {
          event.preventDefault();
          const form = new FormData(event.target);
          state.query = form.get("query").trim();
          state.category = form.get("category");
          state.difficulty = form.get("difficulty");
          state.maxTime = form.get("maxTime");
          state.ingredient = form.get("ingredient").trim();
          render();
        }

        if (event.target.id === "adminForm") {
          event.preventDefault();
          const form = new FormData(event.target);
          const title = form.get("title").trim();
          const recipe = {
            id: "local-" + Date.now(),
            title,
            category: form.get("category").trim(),
            time: Number(form.get("time")),
            servings: 2,
            difficulty: form.get("difficulty"),
            featured: false,
            image:
              "https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&fit=crop&w=1200&q=80",
            description: form.get("description").trim(),
            ingredients: ["Ingredientes adicionados no painel demo", "Ajuste no projeto full-stack para persistir no banco"],
            steps: ["Prepare os ingredientes.", "Finalize e publique a receita."]
          };
          state.customRecipes = [recipe, ...state.customRecipes];
          saveJson(storageKeys.custom, state.customRecipes);
          showToast("Receita criada nesta demonstracao.");
          render();
        }
      });

      render();
    </script>
  </body>
</html>
