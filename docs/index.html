<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Receitas</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <meta
      name="description"
      content="Site moderno de receitas com busca, filtros, detalhes e favoritos."
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #20221e;
        --muted: #686b61;
        --line: rgba(32, 34, 30, 0.12);
        --olive: #53634d;
        --sage: #87956b;
        --linen: #f6f0e6;
        --paper: #fffaf2;
        --white: #ffffff;
        --tomato: #c85f4d;
        --shadow: 0 24px 70px rgba(32, 34, 30, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 0%, rgba(200, 95, 77, 0.14), transparent 32rem),
          linear-gradient(180deg, var(--paper), var(--linen) 48%, var(--paper));
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 250, 242, 0.88);
        backdrop-filter: blur(16px);
      }

      .topbar-inner {
        display: flex;
        min-height: 76px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        border: 0;
        background: transparent;
        color: var(--ink);
        font-weight: 900;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(32, 34, 30, 0.12);
      }

      .brand-name {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.65rem;
        font-weight: 700;
      }

      .nav {
        display: none;
        align-items: center;
        gap: 8px;
      }

      .nav button {
        border: 0;
        border-radius: 8px;
        background: transparent;
        padding: 10px 12px;
        color: rgba(32, 34, 30, 0.68);
        font-size: 0.92rem;
        font-weight: 800;
        transition:
          background 180ms ease,
          color 180ms ease;
      }

      .nav button:hover,
      .nav button.active {
        background: rgba(83, 99, 77, 0.1);
        color: var(--ink);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 16px;
        font-size: 0.92rem;
        font-weight: 900;
        text-decoration: none;
        transition:
          transform 180ms ease,
          background 180ms ease,
          border-color 180ms ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-primary {
        background: var(--ink);
        color: var(--paper);
      }

      .btn-secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.62);
        color: var(--ink);
      }

      .btn-danger {
        background: var(--tomato);
        color: var(--white);
      }

      .mobile-nav {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 0 0 12px;
      }

      .mobile-nav button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.56);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .mobile-nav button.active {
        background: var(--ink);
        color: var(--paper);
      }

      main {
        padding: 34px 0 64px;
      }

      .hero {
        display: grid;
        min-height: calc(100vh - 140px);
        align-items: center;
        gap: 34px;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--olive);
        font-size: 0.75rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        letter-spacing: 0;
      }

      h1 {
        max-width: 820px;
        font-size: clamp(3.2rem, 8vw, 6.6rem);
        line-height: 0.94;
      }

      h2 {
        font-size: clamp(2.2rem, 4vw, 4rem);
        line-height: 1;
      }

      h3 {
        font-size: 1.65rem;
        line-height: 1.08;
      }

      .lead {
        max-width: 680px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.8;
      }

      .search-row {
        display: grid;
        max-width: 720px;
        gap: 10px;
        margin-top: 30px;
      }

      .field,
      .select,
      .area {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        outline: 0;
        padding: 0 14px;
        box-shadow: 0 1px 0 rgba(32, 34, 30, 0.04);
      }

      .area {
        min-height: 96px;
        padding-top: 12px;
        resize: vertical;
      }

      .field:focus,
      .select:focus,
      .area:focus {
        border-color: rgba(83, 99, 77, 0.58);
        box-shadow: 0 0 0 4px rgba(83, 99, 77, 0.12);
      }

      .hero-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--ink);
        color: var(--paper);
        box-shadow: var(--shadow);
      }

      .hero-image {
        min-height: 360px;
        background-position: center;
        background-size: cover;
      }

      .hero-card-content {
        padding: 24px;
      }

      .hero-card-content p {
        color: rgba(255, 250, 242, 0.72);
        line-height: 1.7;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 24px;
      }

      .stat {
        border: 1px solid rgba(255, 250, 242, 0.16);
        border-radius: 8px;
        padding: 14px;
      }

      .stat strong {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.7rem;
      }

      .stat span {
        color: rgba(255, 250, 242, 0.62);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .section {
        padding: 40px 0;
      }

      .section-head {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 22px;
      }

      .cards {
        display: grid;
        gap: 18px;
      }

      .recipe-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 12px 34px rgba(32, 34, 30, 0.06);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
      }

      .recipe-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow);
      }

      .card-image {
        position: relative;
        min-height: 230px;
        background-position: center;
        background-size: cover;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        background: rgba(255, 250, 242, 0.92);
        padding: 0 10px;
        color: var(--ink);
        font-size: 0.76rem;
        font-weight: 900;
      }

      .card-image .pill {
        position: absolute;
        left: 14px;
        top: 14px;
      }

      .card-body {
        padding: 18px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        margin-bottom: 12px;
        color: rgba(32, 34, 30, 0.58);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .card-body p {
        color: var(--muted);
        line-height: 1.65;
      }

      .card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .filters {
        display: grid;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
        padding: 16px;
        box-shadow: 0 12px 34px rgba(32, 34, 30, 0.05);
      }

      .filters-grid {
        display: grid;
        gap: 10px;
      }

      .detail {
        display: grid;
        gap: 24px;
      }

      .detail-image {
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background-position: center;
        background-size: cover;
        box-shadow: var(--shadow);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.68);
        padding: 22px;
        box-shadow: 0 12px 34px rgba(32, 34, 30, 0.05);
      }

      .list {
        display: grid;
        gap: 10px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .list li {
        border-radius: 8px;
        background: rgba(255, 250, 242, 0.9);
        padding: 12px 14px;
        line-height: 1.6;
      }

      .steps {
        display: grid;
        gap: 16px;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
      }

      .steps li {
        display: grid;
        grid-template-columns: 40px 1fr;
        gap: 14px;
        line-height: 1.7;
      }

      .step-number {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border-radius: 999px;
        background: var(--olive);
        color: var(--white);
        font-weight: 900;
      }

      .empty {
        border: 1px dashed rgba(32, 34, 30, 0.22);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.5);
        padding: 48px 22px;
        text-align: center;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.7);
      }

      table {
        width: 100%;
        min-width: 720px;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.92rem;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 14px 16px;
      }

      th {
        color: rgba(32, 34, 30, 0.48);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .account-grid {
        display: grid;
        gap: 16px;
      }

      .form-stack {
        display: grid;
        gap: 12px;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 50;
        max-width: min(360px, calc(100vw - 36px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        padding: 14px 16px;
        box-shadow: var(--shadow);
        font-weight: 800;
        opacity: 0;
        transform: translateY(14px);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      footer {
        border-top: 1px solid var(--line);
        padding: 26px 0;
        color: var(--muted);
      }

      @media (min-width: 720px) {
        .nav {
          display: flex;
        }

        .mobile-nav {
          display: none;
        }

        .search-row {
          grid-template-columns: 1fr auto;
        }

        .section-head {
          flex-direction: row;
          align-items: end;
          justify-content: space-between;
        }

        .cards {
          grid-template-columns: repeat(2, 1fr);
        }

        .filters-grid {
          grid-template-columns: 1.25fr repeat(4, 1fr) auto;
        }

        .account-grid {
          grid-template-columns: 0.9fr 1.1fr;
        }
      }

      @media (min-width: 980px) {
        .hero,
        .detail {
          grid-template-columns: 1fr 0.92fr;
        }

        .cards {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="page topbar-inner">
        <button class="brand" type="button" data-view="home" aria-label="Ir para inicio">
          <img class="brand-mark" src="./logo.svg" alt="" width="42" height="42" />
          <span class="brand-name">Receitas</span>
        </button>
        <nav class="nav" aria-label="Navegacao principal">
          <button type="button" data-view="home">Inicio</button>
          <button type="button" data-view="recipes">Receitas</button>
          <button type="button" data-view="saved">Salvas</button>
          <button type="button" data-view="account">Conta</button>
        </nav>
        <div class="actions" id="authActions"></div>
      </div>
      <div class="page mobile-nav" aria-label="Navegacao mobile">
        <button type="button" data-view="home">Inicio</button>

        <button type="button" data-view="saved">Salvas</button>
        <button type="button" data-view="account">Conta</button>
      </div>
    </header>

    <main class="page" id="app"></main>
    <footer>
      <div class="page">Receitas modernas para cozinhar melhor no dia a dia.</div>
    </footer>
    <div class="toast" id="toast" role="status"></div>

          ingredients: ["400 g de tagliatelle", "500 g de cogumelos", "Vinho tinto", "Cebola", "Parmesao"],
          steps: ["Doure cogumelos em fogo alto.", "Refogue cebola e volte os cogumelos.", "Reduza com vinho tinto.", "Misture a massa e finalize com parmesao."]
        },
        {
          id: "risoto-acafrao-camaroes",
          title: "Risoto de acafrao com camaroes",
          category: "Massas",
          time: 44,
          servings: 3,
          difficulty: "Avancada",
          featured: false,
          image:
            "https://images.unsplash.com/photo-1559847844-5315695dadae?auto=format&fit=crop&w=1400&q=90",
          description:
            "Arroz cremoso com acafrao, camaroes selados e finalizacao citrica.",
          ingredients: ["Arroz arboreo", "Camaroes", "Acafrao", "Caldo de legumes", "Parmesao"],
          steps: ["Sele os camaroes rapidamente.", "Prepare o risoto com caldo aos poucos.", "Junte acafrao no cozimento.", "Finalize com parmesao e camaroes."]
        },
        {
          id: "file-mignon-vinho",
          title: "File mignon ao molho de vinho",
          category: "Jantar rapido",
          time: 40,
          servings: 2,
          difficulty: "Media",
          featured: false,
          image:
            "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=1400&q=90",
          description:
            "Medalhoes no ponto com reducao de vinho tinto, manteiga fria e batatas douradas.",
          ingredients: ["Medalhoes de file", "Vinho tinto", "Caldo de carne", "Manteiga fria", "Batatas bolinha"],
          steps: ["Doure os medalhoes e reserve.", "Reduza vinho e caldo.", "Monte o molho com manteiga fria.", "Sirva com batatas douradas."]
        }
      ];

      const app = document.querySelector("#app");
      const authActions = document.querySelector("#authActions");
      const toast = document.querySelector("#toast");
      const storageKeys = {
        users: "receitas-pages-users",
        currentUser: "receitas-pages-current-user"
      };

      let state = {
        view: "home",
        query: "",
        category: "",
        difficulty: "",
        maxTime: "",
        ingredient: "",
        selectedId: null,
        users: readJson(storageKeys.users, []),
        currentUserEmail: localStorage.getItem(storageKeys.currentUser) || ""
      };

      function readJson(key, fallback) {
        try {
          return JSON.parse(localStorage.getItem(key)) || fallback;
        } catch {
          return fallback;
        }
      }

      function saveJson(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function getRecipes() {
        return baseRecipes;
      }

      function categories() {
        return [...new Set(getRecipes().map((recipe) => recipe.category))].sort();
      }

      function currentUser() {
        return state.users.find((user) => user.email === state.currentUserEmail) || null;
      }

      function persistUsers() {
        saveJson(storageKeys.users, state.users);
      }

      function favorites() {
        return currentUser()?.favorites || [];
      }

      function setCurrentUser(email) {
        state.currentUserEmail = email;
        if (email) {
          localStorage.setItem(storageKeys.currentUser, email);
        } else {
          localStorage.removeItem(storageKeys.currentUser);
        }
      }

      function setView(view) {
        state.view = view;
        state.selectedId = null;
        render();
      }

      function selectRecipe(id) {
        state.selectedId = id;
        state.view = "detail";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function filteredRecipes() {
        return getRecipes().filter((recipe) => {
          const haystack = [
            recipe.title,
            recipe.description,
            recipe.category,
            recipe.ingredients.join(" ")
          ]
            .join(" ")
            .toLowerCase();
          const queryMatch = !state.query || haystack.includes(state.query.toLowerCase());
          const categoryMatch = !state.category || recipe.category === state.category;
          const difficultyMatch = !state.difficulty || recipe.difficulty === state.difficulty;
          const timeMatch = !state.maxTime || recipe.time <= Number(state.maxTime);
          const ingredientMatch =
            !state.ingredient ||
            recipe.ingredients.join(" ").toLowerCase().includes(state.ingredient.toLowerCase());

          return queryMatch && categoryMatch && difficultyMatch && timeMatch && ingredientMatch;
        });
      }

      function isSaved(id) {
        return favorites().includes(id);
      }

      function toggleFavorite(id) {
        const user = currentUser();

        if (!user) {
          state.view = "login";
          showToast("Entre ou crie uma conta para salvar receitas.");
          render();
          return;
        }

        if (user.favorites.includes(id)) {
          user.favorites = user.favorites.filter((item) => item !== id);
          showToast("Receita removida das salvas.");
        } else {
          user.favorites = [...user.favorites, id];
          showToast("Receita salva.");
        }

        persistUsers();
        render();
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2600);
      }

      function recipeCard(recipe) {
        const saved = isSaved(recipe.id);
        return `
          <article class="recipe-card">
            <div class="card-image" style="background-image: url('${recipe.image}')">
              <span class="pill">${recipe.category}</span>
            </div>
            <div class="card-body">
              <div class="meta">
                <span>${recipe.time} min</span>
                <span>${recipe.servings} porcoes</span>
                <span>${recipe.difficulty}</span>
              </div>
              <h3>${recipe.title}</h3>
              <p>${recipe.description}</p>
              <div class="card-actions">
                <button class="btn btn-primary" type="button" data-recipe="${recipe.id}">Ver receita</button>
                <button class="btn btn-secondary" type="button" data-favorite="${recipe.id}">
                  ${saved ? "Remover" : "Salvar"}
                </button>
              </div>
            </div>
          </article>
        `;
      }

      function renderHome() {
        const featured = getRecipes().filter((recipe) => recipe.featured).slice(0, 3);
        const hero = featured[0] || getRecipes()[0];
        return `
          <section class="hero">
            <div>
              <p class="eyebrow">Cozinha simples e elegante</p>
              <h1>Receitas claras para cozinhar melhor.</h1>
              <p class="lead">
                Busque pratos por ingrediente, tempo ou dificuldade, abra o passo a passo e salve
                suas receitas favoritas direto no navegador.
              </p>
              <form class="search-row" id="homeSearch">
                <input class="field" name="query" placeholder="Buscar por receita ou ingrediente" value="${state.query}" />
                <button class="btn btn-primary" type="submit">Buscar receitas</button>
              </form>
            </div>
            <aside class="hero-card">
              <div class="hero-image" style="background-image: url('${hero.image}')"></div>
              <div class="hero-card-content">
                <p class="eyebrow">Receita em destaque</p>
                <h3>${hero.title}</h3>
                <p>${hero.description}</p>
                <div class="stats">
                  <div class="stat"><strong>${getRecipes().length}</strong><span>Receitas</span></div>
                  <div class="stat"><strong>${categories().length}</strong><span>Categorias</span></div>
                  <div class="stat"><strong>${favorites().length}</strong><span>Salvas</span></div>
                </div>
              </div>
            </aside>
          </section>
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Destaques</p>
                <h2>Escolhas da semana</h2>
              </div>
              <button class="btn btn-secondary" type="button" data-view="recipes">Ver todas</button>
            </div>
            <div class="cards">${featured.map(recipeCard).join("")}</div>
          </section>
          <section class="section">
            <div class="panel">
              <p class="eyebrow">Categorias</p>
              <h2>Escolha pelo momento</h2>
              <div class="cards" style="margin-top: 22px">
                ${categories()
                  .map(
                    (category) => `
                      <button class="panel" type="button" data-category="${category}" style="text-align:left">
                        <strong>${category}</strong>
                        <p>${getRecipes().filter((recipe) => recipe.category === category).length} receitas cadastradas</p>
                      </button>
                    `
                  )
                  .join("")}
              </div>
            </div>
          </section>
        `;
      }

      function renderFilters() {
        return `
          <form class="filters" id="filters">
            <strong>Filtros</strong>
            <div class="filters-grid">
              <input class="field" name="query" placeholder="Buscar" value="${state.query}" />
              <select class="select" name="category">
                <option value="">Categoria</option>
                ${categories()
                  .map((category) => `<option ${state.category === category ? "selected" : ""}>${category}</option>`)
                  .join("")}
              </select>
              <select class="select" name="difficulty">
                <option value="">Dificuldade</option>
                ${["Facil", "Media", "Avancada"]
                  .map((item) => `<option ${state.difficulty === item ? "selected" : ""}>${item}</option>`)
                  .join("")}
              </select>
              <input class="field" name="maxTime" type="number" min="1" placeholder="Ate min" value="${state.maxTime}" />
              <input class="field" name="ingredient" placeholder="Ingrediente" value="${state.ingredient}" />
              <button class="btn btn-primary" type="submit">Aplicar</button>
            </div>
          </form>
        `;
      }

      function renderRecipes() {
        const recipes = filteredRecipes();
        return `
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Biblioteca</p>
                <h2>Receitas</h2>
              </div>
            </div>
            ${renderFilters()}
            <div class="section">
              ${
                recipes.length
                  ? `<div class="cards">${recipes.map(recipeCard).join("")}</div>`
                  : `<div class="empty"><h3>Nenhuma receita encontrada</h3><p>Ajuste os filtros ou tente um termo mais amplo.</p></div>`
              }
            </div>
          </section>
        `;
      }

      function renderDetail() {
        const recipe = getRecipes().find((item) => item.id === state.selectedId) || getRecipes()[0];
        return `
          <section class="detail">
            <div class="detail-image" style="background-image: url('${recipe.image}')"></div>
            <div>
              <p class="eyebrow">${recipe.category}</p>
              <h1>${recipe.title}</h1>
              <p class="lead">${recipe.description}</p>
              <div class="card-actions" style="margin-top: 24px">
                <span class="pill">${recipe.time} min</span>
                <span class="pill">${recipe.servings} porcoes</span>
                <span class="pill">${recipe.difficulty}</span>
              </div>
              <div class="card-actions" style="margin-top: 24px">
                <button class="btn btn-primary" type="button" data-favorite="${recipe.id}">
                  ${isSaved(recipe.id) ? "Remover das salvas" : "Salvar receita"}
                </button>
                <button class="btn btn-secondary" type="button" data-view="recipes">Voltar</button>
              </div>
              <section class="panel" style="margin-top: 28px">
                <h3>Ingredientes</h3>
                <ul class="list">${recipe.ingredients.map((item) => `<li>${item}</li>`).join("")}</ul>
              </section>
              <section class="panel" style="margin-top: 16px">
                <h3>Modo de preparo</h3>
                <ol class="steps">
                  ${recipe.steps
                    .map((step, index) => `<li><span class="step-number">${index + 1}</span><span>${step}</span></li>`)
                    .join("")}
                </ol>
              </section>
            </div>
          </section>
        `;
      }

      function renderSaved() {
        if (!currentUser()) {
          return renderLogin("Entre para ver suas receitas salvas.");
        }

        const saved = getRecipes().filter((recipe) => isSaved(recipe.id));
        return `
          <section class="section">
            <div class="section-head">
              <div>
              <p class="eyebrow">Favoritos</p>
              <h2>Receitas salvas</h2>
              </div>
              <button class="btn btn-secondary" type="button" data-view="recipes">Explorar receitas</button>
            </div>
            ${
              saved.length
                ? `<div class="cards">${saved.map(recipeCard).join("")}</div>`
                : `<div class="empty"><h3>Nenhuma receita salva</h3><p>Abra uma receita e salve para montar sua biblioteca.</p></div>`
            }
          </section>
        `;
      }

      function renderLogin(message = "") {
        return `
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Acesso</p>
                <h2>Entrar na conta</h2>
              </div>
              <button class="btn btn-secondary" type="button" data-view="register">Criar conta</button>
            </div>
            <form class="panel form-stack" id="loginForm" style="max-width: 520px">
              ${message ? `<p>${message}</p>` : ""}
              <label>
                <strong>Email</strong>
                <input class="field" name="email" type="email" autocomplete="email" required placeholder="voce@email.com" />
              </label>
              <label>
                <strong>Senha</strong>
                <input class="field" name="password" type="password" autocomplete="current-password" required placeholder="Sua senha" />
              </label>
              <button class="btn btn-primary" type="submit">Entrar</button>
            </form>
          </section>
        `;
      }

      function renderRegister() {
        return `
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Nova conta</p>
                <h2>Criar conta</h2>
              </div>
              <button class="btn btn-secondary" type="button" data-view="login">Entrar</button>
            </div>
            <form class="panel form-stack" id="registerForm" style="max-width: 620px">
              <label>
                <strong>Nome</strong>
                <input class="field" name="name" autocomplete="name" required minlength="2" placeholder="Seu nome" />
              </label>
              <label>
                <strong>Email</strong>
                <input class="field" name="email" type="email" autocomplete="email" required placeholder="voce@email.com" />
              </label>
              <label>
                <strong>Senha</strong>
                <input class="field" name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="Minimo 8 caracteres" />
              </label>
              <label>
                <strong>Confirmar senha</strong>
                <input class="field" name="confirmPassword" type="password" autocomplete="new-password" required minlength="8" placeholder="Repita a senha" />
              </label>
              <button class="btn btn-primary" type="submit">Cadastrar</button>
            </form>
          </section>
        `;
      }

      function renderAccount() {
        const user = currentUser();

        if (!user) {
          return renderLogin("Entre ou crie uma conta para acessar seu perfil.");
        }

        return `
          <section class="section">
            <div class="section-head">
              <div>
                <p class="eyebrow">Minha conta</p>
                <h2>${user.name}</h2>
              </div>
              <button class="btn btn-secondary" type="button" data-logout>Sair</button>
            </div>
            <div class="account-grid">
              <form class="panel form-stack" id="profileForm">
                <h3>Dados do perfil</h3>
                <label>
                  <strong>Nome</strong>
                  <input class="field" name="name" required minlength="2" value="${user.name}" />
                </label>
                <label>
                  <strong>Email</strong>
                  <input class="field" name="email" type="email" required value="${user.email}" />
                </label>
                <button class="btn btn-primary" type="submit">Salvar perfil</button>
              </form>
              <div class="panel">
                <p class="eyebrow">Resumo</p>
                <h3>${favorites().length} receitas salvas</h3>
                <p>Suas receitas ficam ligadas a esta conta neste navegador.</p>
                <div class="card-actions">
                  <button class="btn btn-secondary" type="button" data-view="saved">Ver salvas</button>
                  <button class="btn btn-secondary" type="button" data-view="recipes">Explorar receitas</button>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderAuthActions() {
        const user = currentUser();

        authActions.innerHTML = user
          ? `
              <button class="btn btn-secondary" type="button" data-view="account">${user.name.split(" ")[0]}</button>
              <button class="btn btn-primary" type="button" data-logout>Sair</button>
            `
          : `
              <button class="btn btn-secondary" type="button" data-view="login">Entrar</button>
              <button class="btn btn-primary" type="button" data-view="register">Criar conta</button>
            `;
      }

      function render() {
        renderAuthActions();

        document.querySelectorAll("[data-view]").forEach((button) => {
          button.classList.toggle("active", button.dataset.view === state.view);
        });

        if (state.view === "home") app.innerHTML = renderHome();
        if (state.view === "recipes") app.innerHTML = renderRecipes();
        if (state.view === "detail") app.innerHTML = renderDetail();
        if (state.view === "saved") app.innerHTML = renderSaved();
        if (state.view === "login") app.innerHTML = renderLogin();
        if (state.view === "register") app.innerHTML = renderRegister();
        if (state.view === "account") app.innerHTML = renderAccount();
      }

      document.addEventListener("click", (event) => {
        const viewButton = event.target.closest("[data-view]");
        const recipeButton = event.target.closest("[data-recipe]");
        const favoriteButton = event.target.closest("[data-favorite]");
        const categoryButton = event.target.closest("[data-category]");
        const logoutButton = event.target.closest("[data-logout]");

        if (viewButton) setView(viewButton.dataset.view);
        if (recipeButton) selectRecipe(recipeButton.dataset.recipe);
        if (favoriteButton) toggleFavorite(favoriteButton.dataset.favorite);
        if (logoutButton) {
          setCurrentUser("");
          state.view = "home";
          showToast("Voce saiu da conta.");
          render();
        }
        if (categoryButton) {
          state.category = categoryButton.dataset.category;
          state.view = "recipes";
          render();
        }
      });

      document.addEventListener("submit", (event) => {
        if (event.target.id === "homeSearch") {
          event.preventDefault();
          state.query = new FormData(event.target).get("query").trim();
          state.view = "recipes";
          render();
        }

        if (event.target.id === "filters") {
          event.preventDefault();
          const form = new FormData(event.target);
          state.query = form.get("query").trim();
          state.category = form.get("category");
          state.difficulty = form.get("difficulty");
          state.maxTime = form.get("maxTime");
          state.ingredient = form.get("ingredient").trim();
          render();
        }

        if (event.target.id === "loginForm") {
          event.preventDefault();
          const form = new FormData(event.target);
          const email = form.get("email").trim().toLowerCase();
          const password = form.get("password");
          const user = state.users.find((item) => item.email === email && item.password === password);

          if (!user) {
            showToast("Email ou senha invalidos.");
            return;
          }

          setCurrentUser(user.email);
          state.view = "account";
          showToast("Login realizado.");
          render();
        }

        if (event.target.id === "registerForm") {
          event.preventDefault();
          const form = new FormData(event.target);
          const name = form.get("name").trim();
          const email = form.get("email").trim().toLowerCase();
          const password = form.get("password");
          const confirmPassword = form.get("confirmPassword");

          if (password !== confirmPassword) {
            showToast("As senhas precisam ser iguais.");
            return;
          }

          if (state.users.some((user) => user.email === email)) {
            showToast("Ja existe uma conta com este email.");
            return;
          }

          const user = { name, email, password, favorites: [] };
          state.users = [...state.users, user];
          persistUsers();
          setCurrentUser(email);
          state.view = "account";
          showToast("Conta criada.");
          render();
        }

        if (event.target.id === "profileForm") {
          event.preventDefault();
          const user = currentUser();
          if (!user) return;

          const form = new FormData(event.target);
          const name = form.get("name").trim();
          const email = form.get("email").trim().toLowerCase();
          const emailInUse = state.users.some((item) => item.email === email && item.email !== user.email);

          if (emailInUse) {
            showToast("Este email ja esta em uso.");
            return;
          }

          user.name = name;
          user.email = email;
          persistUsers();
          setCurrentUser(email);
          showToast("Perfil atualizado.");
          render();
        }

      });

      render();
    </script>
  </body>
</html>
